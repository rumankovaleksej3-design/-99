"use client";
import { useState } from "react";

const skins = [
  { name: "AK-47 | Redline", price: 12 },
  { name: "AWP | Asiimov", price: 45 },
  { name: "M4A4 | Neon Rider", price: 30 },
  { name: "Glock-18 | Fade", price: 25 },
  { name: "USP-S | Kill Confirmed", price: 20 },
];

export default function Home() {
  const [balance, setBalance] = useState(100);
  const [rolling, setRolling] = useState(false);
  const [result, setResult] = useState(null);

  const deposit = () => {
    setBalance(balance + 50);
  };

  const openCase = () => {
    if (balance < 10) return alert("Недостаточно средств");

    setBalance(balance - 10);
    setRolling(true);

    setTimeout(() => {
      const win = skins[Math.floor(Math.random() * skins.length)];
      setResult(win);
      setRolling(false);
    }, 2000);
  };

  return (
    <div style={styles.page}>
      <header style={styles.header}>
        <div style={styles.logo}>jabka</div>
        <div>
          💰 Баланс: {balance}$
          <button style={styles.btn} onClick={deposit}>Пополнить</button>
        </div>
      </header>

      <section style={styles.banner}>
        <div style={styles.card}>Бесплатный кейс</div>
        <div style={styles.card}>Промокод +13%</div>
        <div style={styles.card}>VIP CLUB</div>
      </section>

      <section style={{ textAlign: "center" }}>
        <h2>Открытие кейса ($10)</h2>
        <button style={styles.openBtn} onClick={openCase} disabled={rolling}>
          {rolling ? "Открывается..." : "Открыть кейс"}
        </button>

        <div style={styles.roulette}>
          {rolling ? (
            <div style={styles.rollAnim} />
          ) : result ? (
            <div>
              🎉 Вы выбили: <b>{result.name}</b> (${result.price})
            </div>
          ) : null}
        </div>
      </section>

      <section style={styles.cases}>
        <h2>Возможные дропы</h2>
        <div style={styles.grid}>
          {skins.map((s, i) => (
            <div key={i} style={styles.caseItem}>
              <div style={styles.img}></div>
              {s.name}
              <br />${s.price}
            </div>
          ))}
        </div>
      </section>
    </div>
  );
}

const styles = {
  page: {
    background: "#0c1b13",
    minHeight: "100vh",
    color: "white",
    fontFamily: "Arial",
  },
  header: {
    display: "flex",
    justifyContent: "space-between",
    padding: 20,
    background: "#0f2a1d",
  },
  logo: {
    color: "#7CFF7C",
    fontSize: 24,
  },
  btn: {
    marginLeft: 10,
    padding: "5px 10px",
    background: "#7CFF7C",
    border: "none",
    borderRadius: 5,
  },
  banner: {
    display: "flex",
    gap: 10,
    padding: 20,
  },
  card: {
    flex: 1,
    background: "#1e3c2f",
    padding: 20,
    borderRadius: 10,
    textAlign: "center",
  },
  openBtn: {
    padding: "10px 20px",
    background: "#7CFF7C",
    border: "none",
    borderRadius: 10,
    fontSize: 16,
  },
  roulette: {
    marginTop: 20,
    height: 80,
  },
  rollAnim: {
    width: "100%",
    height: 50,
    background: "linear-gradient(90deg, #333, #7CFF7C, #333)",
    animation: "roll 0.3s infinite",
  },
  cases: {
    padding: 20,
  },
  grid: {
    display: "grid",
    gridTemplateColumns: "repeat(auto-fill, minmax(150px,1fr))",
    gap: 10,
  },
  caseItem: {
    background: "#13291d",
    padding: 10,
    borderRadius: 10,
    textAlign: "center",
  },
  img: {
    height: 80,
    background: "#333",
    marginBottom: 10,
  },
};

