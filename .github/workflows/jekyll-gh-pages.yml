// =========================
// app/page.jsx (ОСНОВНОЙ UI)
// =========================
"use client";
import { useEffect, useState, useRef } from "react";
import { weightedRandom } from "../lib/random";

export default function Page() {
  const [skins, setSkins] = useState([]);
  const [balance, setBalance] = useState(100);
  const [inventory, setInventory] = useState([]);
  const [rolling, setRolling] = useState(false);
  const [winner, setWinner] = useState(null);
  const stripRef = useRef();

  useEffect(() => {
    fetch("/api/skins").then(r => r.json()).then(setSkins);
  }, []);

  const deposit = () => setBalance(b => b + 50);

  const openCase = () => {
    if (balance < 10 || rolling) return;
    setBalance(b => b - 10);
    setRolling(true);

    const win = weightedRandom(skins);
    setWinner(win);

    const strip = stripRef.current;
    strip.style.transition = "none";
    strip.style.transform = "translateX(0px)";

    setTimeout(() => {
      strip.style.transition = "transform 3s cubic-bezier(.2,.8,.2,1)";
      strip.style.transform = `translateX(-${Math.random()*2000+1000}px)`;
    }, 50);

    setTimeout(() => {
      setInventory(inv => [...inv, win]);
      setRolling(false);
    }, 3200);
  };

  return (
    <div style={styles.page}>
      <header style={styles.header}>
        <div style={styles.logo}>Jabka Clone</div>
        <div>
          💰 {balance}$
          <button onClick={deposit} style={styles.btn}>Пополнить</button>
        </div>
      </header>

      <div style={styles.rouletteBox}>
        <div ref={stripRef} style={styles.strip}>
          {skins.concat(skins).concat(skins).map((s, i) => (
            <div key={i} style={{...styles.item, borderColor: color(s.rarity)}}>
              {s.name}
            </div>
          ))}
        </div>
      </div>

      <div style={{ textAlign: "center" }}>
        <button onClick={openCase} style={styles.openBtn}>
          {rolling ? "Крутится..." : "Открыть кейс (10$)"}
        </button>
      </div>

      <h3 style={{ padding: 20 }}>🎒 Инвентарь</h3>
      <div style={styles.grid}>
        {inventory.map((i, idx) => (
          <div key={idx} style={{...styles.invItem, borderColor: color(i.rarity)}}>
            {i.name}
          </div>
        ))}
      </div>
    </div>
  );
}

function color(r) {
  return {
    blue: "#4aa3ff",
    purple: "#a855f7",
    pink: "#ec4899",
    red: "#ef4444",
    gold: "#facc15"
  }[r];
}

