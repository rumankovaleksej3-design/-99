// =========================
// lib/random.js (шансы как в CS)
// =========================
export function weightedRandom(items) {
  const total = items.reduce((s, i) => s + i.chance, 0);
  let r = Math.random() * total;
  for (let item of items) {
    if (r < item.chance) return item;
    r -= item.chance;
  }
}

