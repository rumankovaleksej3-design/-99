<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Opening Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0c1b13;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #0f2a1d;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #7CFF7C;
    }

    .btn {
      background: #7CFF7C;
      color: #000;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
    }

    .banner {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .card {
      flex: 1;
      padding: 20px;
      border-radius: 15px;
      background: linear-gradient(135deg, #1e3c2f, #2e6b4b);
    }

    .cases {
      padding: 20px;
    }

    .cases h2 {
      margin-bottom: 15px;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .case-item {
      background: #13291d;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      transition: 0.2s;
    }

    .case-item:hover {
      transform: scale(1.05);
      background: #1c3d2a;
    }

    .case-img {
      width: 100%;
      height: 120px;
      background: #333;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">jabka</div>
  <button class="btn">Авторизация</button>
</header>

<section class="banner">
  <div class="card">
    <h3>Бесплатный кейс</h3>
    <p>за первый депозит</p>
    <button class="btn">Получить</button>
  </div>
  <div class="card">
    <h3>Промокод</h3>
    <p>+13% к депозиту</p>
    <button class="btn">Активировать</button>
  </div>
  <div class="card">
    <h3>VIP CLUB</h3>
    <p>Кешбек и бонусы</p>
    <button class="btn">Вступить</button>
  </div>
</section>

<section class="cases">
  <h2>Популярные кейсы</h2>
  <div class="case-grid">
    <div class="case-item">
      <div class="case-img"></div>
      <p>Case #1</p>
    </div>
    <div class="case-item">
      <div class="case-img"></div>
      <p>Case #2</p>
    </div>
    <div class="case-item">
      <div class="case-img"></div>
      <p>Case #3</p>
    </div>
    <div class="case-item">
      <div class="case-img"></div>
      <p>Case #4</p>
    </div>
  </div>
</section>

<footer>
  © 2026 Case Opening Demo
</footer>

</body>
</html>
